    function shiftPatternIndex(direction, target = 'both') {
        if (engineSourceSelect.value === 'playlist') {
            let activeList = patternPlaylists[beats.toString()][activePlaylistObjIndex];
            if (activeList && activeList.patterns.length > 0) {
                let max = activeList.patterns.length;
                let currentIdx = activePlaylistItemSelect.selectedIndex;
                activePlaylistItemSelect.selectedIndex = (currentIdx + direction + max) % max;
                setBasePattern();
                saveState();
            }
            return; // Playlist overrides manual A/B shift
        }

        if (target === 'A' || target === 'both') {
            let maxA = currentVariationsA.length;
            if (maxA > 0) {
                let currentIdxA = variationSelectA.selectedIndex;
                if (currentIdxA < 0) currentIdxA = 0;
                variationSelectA.selectedIndex = (currentIdxA + direction + maxA) % maxA;
            }
        }
        
        if (beats === 16 && (target === 'B' || target === 'both')) {
            let maxB = currentVariationsB.length;
            if (maxB > 0) {
                let currentIdxB = variationSelectB.selectedIndex;
                if (currentIdxB < 0) currentIdxB = 0;
                variationSelectB.selectedIndex = (currentIdxB + direction + maxB) % maxB;
            }
        }

        setBasePattern();
        saveState(); 
    }

    prevBtnBoth.addEventListener('click', () => shiftPatternIndex(-1, 'both'));
    prevBtnA.addEventListener('click', () => shiftPatternIndex(-1, 'A'));
    prevBtnB.addEventListener('click', () => shiftPatternIndex(-1, 'B'));
    
    nextBtnBoth.addEventListener('click', () => shiftPatternIndex(1, 'both'));
    nextBtnA.addEventListener('click', () => shiftPatternIndex(1, 'A'));
    nextBtnB.addEventListener('click', () => shiftPatternIndex(1, 'B'));

    function manualRotate(direction) {
        const localMax = beats === 16 ? 8 : beats;

        if (engineSourceSelect.value === 'playlist') {
            engineSourceSelect.value = 'math';
            toggleEngineSourceUI();

            function syncToMath(visualBase, offset, isPatternB) {
                let targetVisual = new Array(localMax).fill(0);
                for (let i = 0; i < localMax; i++) {
                    let baseIdx = ((i - offset) % localMax + localMax) % localMax;
                    targetVisual[i] = visualBase[baseIdx];
                }
                
                let noteCount = targetVisual.reduce((a, b) => a + b, 0);
                if (noteCount === 0) return 0; 

                if (isPatternB) noteSelectB.value = noteCount;
                else noteSelectA.value = noteCount;

                let tempDict = generateUniqueNecklaces(noteCount, localMax);
                let foundVarIndex = 0;
                let foundOffset = 0;

                for (let v = 0; v < tempDict.length; v++) {
                    let matched = false;
                    for (let off = 0; off < localMax; off++) {
                        let isMatch = true;
                        for (let step = 0; step < localMax; step++) {
                            let baseStep = ((step - off) % localMax + localMax) % localMax;
                            if (tempDict[v][baseStep] !== targetVisual[step]) {
                                isMatch = false; break;
                            }
                        }
                        if (isMatch) {
                            foundVarIndex = v;
                            foundOffset = off;
                            matched = true;
                            break;
                        }
                    }
                    if (matched) break;
                }

                if (isPatternB) {
                    currentVariationsB = tempDict;
                    variationSelectB.innerHTML = '';
                    currentVariationsB.forEach((pat, idx) => {
                        let opt = document.createElement('option');
                        opt.value = idx; opt.text = `Var ${idx + 1}: [${pat.join('-')}]`;
                        variationSelectB.appendChild(opt);
                    });
                    variationSelectB.selectedIndex = foundVarIndex;
                } else {
                    currentVariationsA = tempDict;
                    variationSelectA.innerHTML = '';
                    currentVariationsA.forEach((pat, idx) => {
                        let opt = document.createElement('option');
                        opt.value = idx; opt.text = `Var ${idx + 1}: [${pat.join('-')}]`;
                        variationSelectA.appendChild(opt);
                    });
                    variationSelectA.selectedIndex = foundVarIndex;
                }
                return foundOffset;
            }

            audioOffsetA = syncToMath(uiDrawPatternA, uiOffsetA, false);
            if (beats === 16) {
                audioOffsetB = syncToMath(uiDrawPatternB, uiOffsetB, true);
            }
            
            setBasePattern(); 
        }

        audioOffsetA = (audioOffsetA + direction) % localMax;
        if (audioOffsetA < 0) audioOffsetA += localMax;
        
        audioOffsetB = (audioOffsetB + direction) % localMax;
        if (audioOffsetB < 0) audioOffsetB += localMax;

        if (playState === "STOPPED") {
            uiOffsetA = audioOffsetA;
            uiOffsetB = audioOffsetB;
            draw(true);
        } else {
            uiUpdates.push({ time: audioCtx.currentTime + 0.05, newOffsetA: audioOffsetA, newOffsetB: audioOffsetB });
        }
        saveState();
    }
    
    rotLeftBtn.addEventListener('click', () => manualRotate(-1));
    rotRightBtn.addEventListener('click', () => manualRotate(1));

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(time, freq, isOrigin, volume, typeOverride = null) {
        if (volume <= 0) return; 
        const osc = audioCtx.createOscillator();
        const envelope = audioCtx.createGain();
        osc.type = typeOverride ? typeOverride : (isOrigin ? 'triangle' : 'sine'); 
        osc.frequency.setValueAtTime(isOrigin ? 660 : freq, time);
        envelope.gain.setValueAtTime(volume, time);
        envelope.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
        osc.connect(envelope);
        envelope.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.15);
    }

    function playMetronome(time, isBeatOne) {
        const vol = parseFloat(metVol.value) || 0;
        if (vol <= 0) return;
        const osc = audioCtx.createOscillator();
        const env = audioCtx.createGain();
        
        osc.type = 'square';
        osc.frequency.setValueAtTime(isBeatOne ? 1200 : 800, time);
        osc.frequency.exponentialRampToValueAtTime(100, time + 0.05);
        env.gain.setValueAtTime(isBeatOne ? vol : vol * 0.4, time); 
        env.gain.exponentialRampToValueAtTime(0.001, time + 0.05);

        osc.connect(env);
        env.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.05);
    }

    function triggerVisualFlash(delaySecs) {
        const safeDelay = Math.max(0, delaySecs);
        setTimeout(() => {
            canvas.classList.add("flash");
            setTimeout(() => canvas.classList.remove("flash"), 100);
        }, safeDelay * 1000);
    }

    function scheduler() {
        if (playState === "STOPPED" || playState === "PAUSED") return;

        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            
            if (currentBeat === 0) cycleStartTime = nextNoteTime;
            
            const swingAmount = (beats === 8 || beats === 16) ? (parseFloat(swingSlider.value) || 0.5) : 0.5;
            const quarterDuration = 60 / (tempo || 120);
            
            const isDownbeat = currentBeat % stepsPerBeat === 0;
            let currentStepDuration = quarterDuration / stepsPerBeat;
            
            if (beats === 8) {
                currentStepDuration = isDownbeat ? quarterDuration * swingAmount : quarterDuration * (1.0 - swingAmount);
            } else if (beats === 16) {
                if (currentBeat % 2 === 0) { 
                    currentStepDuration = (quarterDuration / 2) * swingAmount;
                } else { 
                    currentStepDuration = (quarterDuration / 2) * (1.0 - swingAmount);
                }
            }
            
            currentStepDuration = Math.max(0.05, currentStepDuration);
            
            let activePattern, activeOffset, localBeat, localBeats;

            if (beats === 16) {
                localBeats = 8;
                if (currentBeat < 8) {
                    activePattern = basePatternA;
                    activeOffset = audioOffsetA;
                    localBeat = currentBeat;
                } else {
                    activePattern = basePatternB;
                    activeOffset = audioOffsetB;
                    localBeat = currentBeat - 8;
                }
            } else {
                localBeats = beats;
                activePattern = basePatternA;
                activeOffset = audioOffsetA;
                localBeat = currentBeat;
            }

            let internalPatternIndex = ((localBeat - activeOffset) % localBeats + localBeats) % localBeats;

            if (isCountIn) {
                if (isDownbeat) {
                    let beatNum = Math.floor(currentBeat / stepsPerBeat);
                    if (beatNum >= 0 && beatNum < 4 && metBeats[beatNum].checked) {
                        if (metToggle.checked) playMetronome(nextNoteTime, currentBeat === 0);
                        if (visPulseToggle.checked) triggerVisualFlash(nextNoteTime - audioCtx.currentTime);
                    }
                }
                
                engineStatus.innerText = "COUNT IN...";
                engineStatus.style.color = "#ffb300";

                if (currentBeat === beats - 1) {
                    isCountIn = false;
                    patternCycles = 0;
                    practicePhase = 0;
                }
                
                nextNoteTime += currentStepDuration;
                currentBeat = (currentBeat + 1) % beats;
                continue; 
            } 

            if (isDownbeat) {
                let beatNum = Math.floor(currentBeat / stepsPerBeat);
                if (beatNum >= 0 && beatNum < 4 && metBeats[beatNum].checked) {
                    if (metToggle.checked) playMetronome(nextNoteTime, currentBeat === 0);
                    if (visPulseToggle.checked) triggerVisualFlash(nextNoteTime - audioCtx.currentTime);
                }
            }

            if (rideToggle.checked) {
                const ridePattern8 = [0, 2, 3, 4, 6, 7]; 
                const ridePattern12 = [0, 2, 3, 5, 6, 8, 9, 11]; 
                const ridePattern16 = [0, 4, 6, 8, 12, 14]; 
                let activeRide = ridePattern8;
                if (beats === 12) activeRide = ridePattern12;
                if (beats === 16) activeRide = ridePattern16;
                
                if (activeRide.includes(currentBeat)) {
                    const rVol = parseFloat(rideVol.value) || 0;
                    if (rVol > 0) playSound(nextNoteTime, 4000, false, rVol, 'triangle'); 
                }
            }

            let isMuted = false;
            let pMode = practiceSelect.value;
            let reps = parseInt(document.getElementById('repsInput').value) || 1;
            let totalInSet = reps * 2;
            let currentPosInSet = practicePhase % totalInSet;
            let isFirstHalf = currentPosInSet < reps;

            if (pMode === "call") isMuted = !isFirstHalf;
            if (pMode === "sight") isMuted = isFirstHalf;

            if (activePattern && activePattern[internalPatternIndex] === 1 && !isMuted) {
                const accentState = accentGrid[currentBeat] || 0;
                let noteVolume = 0.15; 
                if (accentState === 1) noteVolume = 0.5; 
                if (accentState === 2) noteVolume = 0.9; 
                
                let isOrigin = (internalPatternIndex === 0) && originToggle.checked;
                playSound(nextNoteTime, 440, isOrigin, noteVolume); 
            }

            const mode = parseInt(modeSelect.value) || 0;
            const shiftAfter = parseInt(intervalInput.value) || 2;

            if (pMode === "off") {
                if (currentBeat === 0) hasShiftedThisCycle = false;

                if (mode === 1 || mode === 2 || mode === 4) {
                    let shiftDirection = mode === 1 ? -1 : (mode === 2 ? 1 : upcomingShiftDirection);
                    currentActiveTrigger = beats - 1;
                    
                    if (currentBeat === beats - 1 && !hasShiftedThisCycle) {
                        patternCycles++; 
                        hasShiftedThisCycle = true;
                        
                        if (patternCycles >= shiftAfter) {
                            if (engineSourceSelect.value === 'math') {
                                const localMax = beats === 16 ? 8 : beats;
                                lastAppliedShiftDirection = shiftDirection;
                                audioOffsetA = (audioOffsetA + shiftDirection) % localMax;
                                if (audioOffsetA < 0) audioOffsetA += localMax;
                                
                                audioOffsetB = (audioOffsetB + shiftDirection) % localMax;
                                if (audioOffsetB < 0) audioOffsetB += localMax;

                                uiUpdates.push({ time: nextNoteTime + 0.05, newOffsetA: audioOffsetA, newOffsetB: audioOffsetB });
                                if (mode === 4) upcomingShiftDirection = Math.random() > 0.5 ? 1 : -1;
                            }
                            patternCycles = 0;
                        }
                    }
                } else {
                    currentActiveTrigger = -1;
                }

                if ((mode === 3 || mode === 5) && currentBeat === beats - 1) {
                    patternCycles++;
                    if (patternCycles >= shiftAfter) {
                        if (engineSourceSelect.value === 'math') {
                            if (mode === 3) {
                                let maxA = currentVariationsA.length;
                                if(maxA > 0) variationSelectA.selectedIndex = (variationSelectA.selectedIndex + 1) % maxA;
                                if (beats === 16) {
                                    let maxB = currentVariationsB.length;
                                    if(maxB > 0) variationSelectB.selectedIndex = (variationSelectB.selectedIndex + 1) % maxB;
                                }
                            } else if (mode === 5) {
                                let maxA = currentVariationsA.length;
                                if(maxA > 0) variationSelectA.selectedIndex = Math.floor(Math.random() * maxA);
                                if (beats === 16) {
                                    let maxB = currentVariationsB.length;
                                    if(maxB > 0) variationSelectB.selectedIndex = Math.floor(Math.random() * maxB);
                                }
                            }
                        } else {
                            // Source is Playlist
                            let activeList = patternPlaylists[beats.toString()][activePlaylistObjIndex];
                            if (activeList && activeList.patterns.length > 0) {
                                let maxQ = activeList.patterns.length;
                                if (mode === 3) {
                                    activePlaylistItemSelect.selectedIndex = (activePlaylistItemSelect.selectedIndex + 1) % maxQ;
                                } else if (mode === 5) {
                                    activePlaylistItemSelect.selectedIndex = Math.floor(Math.random() * maxQ);
                                }
                            }
                        }
                        setBasePattern();
                        patternCycles = 0;
                    }
                }

                engineStatus.innerText = mode === 0 ? "Static Loop" : `Measure ${patternCycles + 1} / ${shiftAfter}`;
                engineStatus.style.color = "#00ff6a";

            } else {
                currentActiveTrigger = -1; 

                if (currentBeat === beats - 1) {
                    practicePhase++; 
                    let reps = parseInt(document.getElementById('repsInput').value) || 1;
                    let totalInSet = reps * 2;
                    let newPosInSet = practicePhase % totalInSet;
                    
                    if (newPosInSet === 0) {
                        patternCycles++;
                        
                        if (patternCycles >= shiftAfter) {
                            if (mode === 1 || mode === 2 || mode === 4) {
                                if (engineSourceSelect.value === 'math') {
                                    let shiftDirection = mode === 1 ? -1 : (mode === 2 ? 1 : upcomingShiftDirection);
                                    const localMax = beats === 16 ? 8 : beats;
                                    lastAppliedShiftDirection = shiftDirection;
                                    audioOffsetA = (audioOffsetA + shiftDirection) % localMax;
                                    if (audioOffsetA < 0) audioOffsetA += localMax;
                                    
                                    audioOffsetB = (audioOffsetB + shiftDirection) % localMax;
                                    if (audioOffsetB < 0) audioOffsetB += localMax;

                                    uiUpdates.push({ time: nextNoteTime + currentStepDuration, newOffsetA: audioOffsetA, newOffsetB: audioOffsetB });
                                    if (mode === 4) upcomingShiftDirection = Math.random() > 0.5 ? 1 : -1;
                                }
                            } else if (mode === 3 || mode === 5) {
                                if (engineSourceSelect.value === 'math') {
                                    if (mode === 3) {
                                        let maxA = currentVariationsA.length;
                                        if(maxA > 0) variationSelectA.selectedIndex = (variationSelectA.selectedIndex + 1) % maxA;
                                        if (beats === 16) {
                                            let maxB = currentVariationsB.length;
                                            if(maxB > 0) variationSelectB.selectedIndex = (variationSelectB.selectedIndex + 1) % maxB;
                                        }
                                    } else if (mode === 5) {
                                        let maxA = currentVariationsA.length;
                                        if(maxA > 0) variationSelectA.selectedIndex = Math.floor(Math.random() * maxA);
                                        if (beats === 16) {
                                            let maxB = currentVariationsB.length;
                                            if(maxB > 0) variationSelectB.selectedIndex = Math.floor(Math.random() * maxB);
                                        }
                                    }
                                } else {
                                    // Source is Playlist
                                    let activeList = patternPlaylists[beats.toString()][activePlaylistObjIndex];
                                    if (activeList && activeList.patterns.length > 0) {
                                        let maxQ = activeList.patterns.length;
                                        if (mode === 3) {
                                            activePlaylistItemSelect.selectedIndex = (activePlaylistItemSelect.selectedIndex + 1) % maxQ;
                                        } else if (mode === 5) {
                                            activePlaylistItemSelect.selectedIndex = Math.floor(Math.random() * maxQ);
                                        }
                                    }
                                }
                                setBasePattern();
                            }
                            patternCycles = 0;
                        }
                    }
                }

                let text = isMuted ? "YOUR TURN (PLAY)" : "LISTEN & LEARN";
                let color = isMuted ? "#ff5252" : "#4fc3f7";
                let repsForText = parseInt(document.getElementById('repsInput').value) || 1;
                let phaseRep = ((practicePhase-1 < 0 ? 0 : practicePhase-1) % repsForText) + 1;
                engineStatus.innerText = `${text} | Rep ${phaseRep}/${repsForText} | Cycle Set ${patternCycles + 1}/${shiftAfter}`;
                engineStatus.style.color = color;
            }

            // --- EVOLUTION LAB BLOCK (runs alongside modeSelect) ---
            {
                const eShiftAfter = parseInt(intervalInput.value) || 2;
                const eModeA = evolState.modeA;
                const eModeB = evolState.indepAB && beats === 16 ? evolState.modeB : eModeA;
                const isIndep = evolState.indepAB && beats === 16;

                // Determine trigger step for each channel
                const trigA = isIndep && evolState.trigger === 'endB'
                    ? evolTriggerStep('endA', beats, stepsPerBeat)
                    : evolTriggerStep(evolState.trigger, beats, stepsPerBeat);
                const trigB = isIndep && evolState.trigger === 'endA'
                    ? evolTriggerStep('endB', beats, stepsPerBeat)
                    : evolTriggerStep(evolState.trigger, beats, stepsPerBeat);

                const isQuantized = (step) => {
                    if (evolState.quantize === 'step') return true;
                    if (evolState.quantize === 'beat') return currentBeat % stepsPerBeat === 0;
                    return currentBeat === beats - 1; // 'cycle'
                };

                if (pMode === 'off') {
                    // Channel A
                    if (eModeA !== 0 && currentBeat === trigA && isQuantized(currentBeat)) {
                        evolCyclesA++;
                        if (evolCyclesA >= eShiftAfter) {
                            applyEvolChannelAction('A', eModeA);
                            evolCyclesA = 0;
                        }
                    }
                    // Channel B (independent only)
                    if (isIndep && eModeB !== 0 && currentBeat === trigB && isQuantized(currentBeat)) {
                        evolCyclesB++;
                        if (evolCyclesB >= eShiftAfter) {
                            applyEvolChannelAction('B', eModeB);
                            evolCyclesB = 0;
                        }
                    }
                }

                // Reset counters on play start (handled by existing patternCycles reset)
                if (currentBeat === 0 && !hasShiftedThisCycle) {
                    // counters are managed per-trigger, no global reset needed
                }
            }

            nextNoteTime += currentStepDuration;
            currentBeat = (currentBeat + 1) % beats;
        }
        requestAnimationFrame(scheduler);
    }

    // --- DRAWING ---
    let uiDrawPatternA = []; 
    let uiDrawPatternB = [];

    function draw(forceSingleFrame = false) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const cx = 225, cy = 225, r = 150, accentRadius = 190;
        const canvasScale = canvas.clientWidth ? (canvas.clientWidth / canvas.width) : 1;
        const innerSizeScale = Math.min(1.7, Math.max(1, 1 / Math.max(canvasScale, 0.6)));
        const innerBaseRadius = 8 * innerSizeScale;
        const activeBeatRadius = 10 * innerSizeScale;
        const originBeatRadius = 12 * innerSizeScale;
        const triggerRingRadius = 14 * innerSizeScale;
        const swingAmount = (beats === 8 || beats === 16) ? (parseFloat(swingSlider.value) || 0.5) : 0.5;

        if (audioCtx && uiUpdates.length > 0 && playState === "PLAYING") {
            if (audioCtx.currentTime >= uiUpdates[0].time) {
                let update = uiUpdates.shift();
                let prevOffsetA = uiOffsetA;
                let prevOffsetB = uiOffsetB;
                if (update.newOffsetA !== undefined) {
                    uiOffsetA = update.newOffsetA;
                }
                if (update.newOffsetB !== undefined) {
                    uiOffsetB = update.newOffsetB;
                }
                if (update.newOffsetA !== undefined || update.newOffsetB !== undefined) {
                    startPreviewLiftAnimation(prevOffsetA, prevOffsetB);
                }
                if (update.newPatternA !== undefined) uiDrawPatternA = update.newPatternA;
                if (update.newPatternB !== undefined) uiDrawPatternB = update.newPatternB;
            }
        } else if (playState === "STOPPED" || uiDrawPatternA.length === 0) {
            uiDrawPatternA = [...basePatternA];
            uiDrawPatternB = [...basePatternB];
            uiOffsetAnimA = null;
            uiOffsetAnimB = null;
            previewLiftStartMs = 0;
        }

        const drawOffsetA = uiOffsetA;
        const drawOffsetB = uiOffsetB;

        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = '#181818';
        ctx.fill();
        
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]); 
        
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(cx, cy, accentRadius, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.setLineDash([]); 

        ctx.strokeStyle = '#2a2a2a';
        ctx.lineWidth = 2;
        for (let i = 0; i < 4; i++) {
            const angle = i * (Math.PI / 2) - Math.PI / 2;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(angle) * (accentRadius + 10), cy + Math.sin(angle) * (accentRadius + 10));
            ctx.stroke();
        }

        for (let i = 0; i < beats; i++) {
            let angle = calculateStepAngle(i, beats, stepsPerBeat, swingAmount);
            
            const x = cx + Math.cos(angle) * accentRadius;
            const y = cy + Math.sin(angle) * accentRadius;
            const accentState = accentGrid[i] || 0;
            
            ctx.beginPath();
            if (accentState === 0) {
                ctx.arc(x, y, 4, 0, Math.PI * 2); 
                ctx.fillStyle = '#555';
            } else if (accentState === 1) {
                ctx.arc(x, y, 7, 0, Math.PI * 2); 
                ctx.fillStyle = '#4fc3f7'; 
            } else {
                ctx.arc(x, y, 10, 0, Math.PI * 2); 
                ctx.fillStyle = '#ff5252'; 
            }
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(angle) * (r + 15), cy + Math.sin(angle) * (r + 15));
            ctx.lineTo(x, y);
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        let isMuted = false;
        let pMode = practiceSelect.value;
        let repsInputEl = document.getElementById('repsInput');
        let reps = repsInputEl ? (parseInt(repsInputEl.value) || 1) : 1;
        let totalInSet = reps * 2;
        let currentPosInSet = practicePhase % totalInSet;
        let isFirstHalf = currentPosInSet < reps;

        if (isCountIn) isMuted = true;
        if (!isCountIn && pMode === "call") isMuted = !isFirstHalf;
        if (!isCountIn && pMode === "sight") isMuted = isFirstHalf;


        // --- WATERFALL / LOOK-AHEAD LOGIC ---
        let previewToggleEl = document.getElementById('previewToggle');
        if (previewToggleEl && previewToggleEl.checked) {
            const modeValue = modeSelect.value;
            const isShiftMode = modeValue === "1" || modeValue === "2" || modeValue === "4";
            const previewLift = getPreviewLiftProgress();
            const liftActive = isShiftMode && previewLift < 1;
            const dirNow = modeValue === "1"
                ? -1
                : (modeValue === "2" ? 1 : (liftActive ? lastAppliedShiftDirection : upcomingShiftDirection));

            function drawPreviewRing(ringRadius, ringOpacity, ringScale, simOffsetA, simOffsetB) {
                for (let i = 0; i < beats; i++) {
                    let angle = calculateStepAngle(i, beats, stepsPerBeat, swingAmount);
                    const x = cx + Math.cos(angle) * ringRadius;
                    const y = cy + Math.sin(angle) * ringRadius;

                    ctx.beginPath();
                    ctx.arc(x, y, innerBaseRadius * ringScale, 0, Math.PI * 2);
                    ctx.fillStyle = '#111';
                    ctx.fill();
                    ctx.lineWidth = 2 * ringScale;
                    ctx.strokeStyle = '#333';
                    ctx.stroke();

                    let patternIndex = 0;
                    let isActive = false;

                    if (beats === 16) {
                        let localBeats = 8;
                        if (i < 8) {
                            patternIndex = ((i - simOffsetA) % localBeats + localBeats) % localBeats;
                            isActive = uiDrawPatternA[patternIndex] === 1;
                        } else {
                            patternIndex = ((i - 8 - simOffsetB) % localBeats + localBeats) % localBeats;
                            isActive = uiDrawPatternB[patternIndex] === 1;
                        }
                    } else {
                        patternIndex = ((i - simOffsetA) % beats + beats) % beats;
                        isActive = uiDrawPatternA[patternIndex] === 1;
                    }

                    if (isActive) {
                        ctx.beginPath();
                        ctx.arc(x, y, activeBeatRadius * ringScale, 0, Math.PI * 2);
                        if (isMuted && playState === "PLAYING") {
                            ctx.fillStyle = `rgba(85, 85, 85, ${ringOpacity})`;
                        } else {
                            ctx.fillStyle = `rgba(0, 255, 106, ${ringOpacity})`;
                        }
                        ctx.fill();
                    }
                }
            }

            if (liftActive) {
                const easedLift = 1 - Math.pow(1 - previewLift, 3);
                const fromA = previewLiftFromOffsetA;
                const fromB = previewLiftFromOffsetB;

                // Ring 2 -> Ring 1
                drawPreviewRing(
                    (r - 70) + (35 * easedLift),
                    0.12,
                    0.4 + (0.2 * easedLift),
                    Math.round(fromA + dirNow * 2),
                    Math.round(fromB + dirNow * 2)
                );

                // Ring 1 -> Outer
                drawPreviewRing(
                    (r - 35) + (35 * easedLift),
                    0.35 * (1 - easedLift * 0.25),
                    0.75 + (0.10 * easedLift),
                    Math.round(fromA + dirNow),
                    Math.round(fromB + dirNow)
                );

                // New far preview fades in at ring 2
                drawPreviewRing(
                    r - 70,
                    0.10 * easedLift,
                    0.4,
                    Math.round(uiOffsetA + dirNow * 2),
                    Math.round(uiOffsetB + dirNow * 2)
                );
            } else {
                for (let ring = 2; ring >= 1; ring--) {
                    const ringRadius = r - (ring * 35);
                    const ringOpacity = ring === 1 ? 0.35 : 0.12;
                    const ringScale = ring === 1 ? 0.75 : 0.4;
                    const shifts = ring;
                    let simOffsetA = uiOffsetA;
                    let simOffsetB = uiOffsetB;

                    if (isShiftMode) {
                        simOffsetA += dirNow * shifts;
                        simOffsetB += dirNow * shifts;
                    }

                    drawPreviewRing(ringRadius, ringOpacity, ringScale, Math.round(simOffsetA), Math.round(simOffsetB));
                }
            }
        }

        for (let i = 0; i < beats; i++) {
            let angle = calculateStepAngle(i, beats, stepsPerBeat, swingAmount);
            
            const x = cx + Math.cos(angle) * r;
            const y = cy + Math.sin(angle) * r;
            
            let labelDist = r - 28;
            if (beats === 12) labelDist = r - 20;
            if (beats === 16) labelDist = r - 18;

            const labelX = cx + Math.cos(angle) * labelDist;
            const labelY = cy + Math.sin(angle) * labelDist;
            ctx.fillStyle = '#666';
            ctx.font = beats >= 12 ? 'bold 10px monospace' : 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            let lbl = stepLabels[i] || "";
            if (beats === 16 && !["1","2","3","4"].includes(lbl)) {
                ctx.fillStyle = '#444'; 
            }
            ctx.fillText(lbl, labelX, labelY);
            
            let isTriggerStep = i === currentActiveTrigger;

            ctx.beginPath();
            ctx.arc(x, y, innerBaseRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#111';
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#333';
            ctx.stroke();
            
            if (isTriggerStep && pMode === "off" && modeSelect.value !== "0" && modeSelect.value !== "3" && modeSelect.value !== "5") {
                ctx.beginPath();
                ctx.arc(x, y, triggerRingRadius, 0, Math.PI * 2);
                ctx.lineWidth = 1;
                ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
                ctx.stroke();
            }
        }

        function drawActivePattern(pattern, localBeats, displayOffset, stepBase) {
            if (!pattern || !pattern.length) return;
            for (let idx = 0; idx < localBeats; idx++) {
                if (pattern[idx] !== 1) continue;

                const stepPos = ((idx + displayOffset + stepBase) % beats + beats) % beats;
                const angle = calculateContinuousStepAngle(stepPos, beats, stepsPerBeat, swingAmount);
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                const isOrigin = idx === 0 && originToggle.checked;

                ctx.beginPath();
                ctx.arc(x, y, isOrigin ? originBeatRadius : activeBeatRadius, 0, Math.PI * 2);
                if (isMuted && playState === "PLAYING") {
                    ctx.fillStyle = '#555';
                } else {
                    ctx.fillStyle = isOrigin ? '#ff00ff' : '#00ff6a';
                }
                ctx.fill();
            }
        }

        if (beats === 16) {
            drawActivePattern(uiDrawPatternA, 8, drawOffsetA, 0);
            drawActivePattern(uiDrawPatternB, 8, drawOffsetB, 8);
        } else {
            drawActivePattern(uiDrawPatternA, beats, drawOffsetA, 0);
        }

        if (playState === "PLAYING" && audioCtx) {
            const cycleDuration = (60 / (tempo || 120)) * 4; 
            let timeElapsed = audioCtx.currentTime - cycleStartTime;
            if (timeElapsed < 0) timeElapsed = 0; 
            
            const progress = (timeElapsed / cycleDuration) % 1;
            const sweepAngle = (progress * Math.PI * 2) - Math.PI / 2;
            
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(sweepAngle) * accentRadius, cy + Math.sin(sweepAngle) * accentRadius);
            ctx.strokeStyle = isMuted ? 'rgba(255, 179, 0, 0.7)' : 'rgba(0, 255, 106, 0.7)'; 
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, 6, 0, Math.PI * 2);
            ctx.fillStyle = isMuted ? '#ffb300' : '#00ff6a';
            ctx.fill();
        } else {
            ctx.beginPath();
            ctx.arc(cx, cy, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#444';
            ctx.fill();
        }

        if (!forceSingleFrame) {
            requestAnimationFrame(() => draw());
        }
    }

    // BOOT SEQUENCE
    loadState();
</script>
</body>
</html>
