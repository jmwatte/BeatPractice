            // --- Tap Tempo Logic ---
            let tapTimes = [];
            tapTempoBtn.addEventListener("click", () => {
                const now = Date.now();
                if (
                    tapTimes.length > 0 &&
                    now - tapTimes[tapTimes.length - 1] > 2000
                ) {
                    tapTimes = [];
                }
                tapTimes.push(now);
                if (tapTimes.length > 5) tapTimes.shift();

                if (tapTimes.length > 1) {
                    let intervals = [];
                    for (let i = 1; i < tapTimes.length; i++) {
                        intervals.push(tapTimes[i] - tapTimes[i - 1]);
                    }
                    let avgInterval =
                        intervals.reduce((a, b) => a + b) / intervals.length;
                    let calculatedBpm = Math.round(60000 / avgInterval);

                    let minBpm = parseInt(bpmSlider.min) || 60;
                    let maxBpm = parseInt(bpmSlider.max) || 240;
                    let finalBpm = Math.max(
                        minBpm,
                        Math.min(maxBpm, calculatedBpm),
                    );

                    bpmSlider.value = finalBpm;
                    document.getElementById("bpmValue").innerText = finalBpm;
                    saveState();
                }

                tapTempoBtn.style.backgroundColor = "#4fc3f7";
                tapTempoBtn.style.color = "#000";
                setTimeout(() => {
                    tapTempoBtn.style.backgroundColor = "#555";
                    tapTempoBtn.style.color = "white";
                }, 100);
            });

            function getCombinations(arr, k, maxLimit = 1000) {
                let result = [];
                function helper(start, combo) {
                    if (result.length >= maxLimit) return;
                    if (combo.length === k) {
                        result.push([...combo]);
                        return;
                    }
                    for (let i = start; i < arr.length; i++) {
                        helper(i + 1, [...combo, arr[i]]);
                    }
                }
                helper(0, []);
                return result;
            }

            // --- Helpers for center-out expansion and quota allocation ---
            function computeExpansionSizes(seed, maxSize) {
                seed = Math.max(1, Math.min(maxSize, parseInt(seed) || 1));
                const sizes = [seed];
                for (let d = 1; d <= maxSize; d++) {
                    const up = seed + d;
                    const down = seed - d;
                    if (up <= maxSize) sizes.push(up);
                    if (down >= 1) sizes.push(down);
                    if (sizes.length >= maxSize) break;
                }
                return [...new Set(sizes)];
            }

            function nCk(n, k) {
                if (k < 0 || k > n) return 0;
                k = Math.min(k, n - k);
                let res = 1;
                for (let i = 1; i <= k; i++) {
                    res = (res * (n - (k - i))) / i;
                }
                return Math.round(res);
            }

            function allocateQuotasForSizes(
                sizes,
                nSteps,
                globalLimit,
                seed,
                useNecklace = false,
            ) {
                const counts = sizes.map((k) =>
                    useNecklace ? necklaceCount(nSteps, k) : nCk(nSteps, k),
                );
                const totalPossible = counts.reduce((a, b) => a + b, 0);
                if (totalPossible <= globalLimit) {
                    return counts.slice();
                }

                const weights = sizes.map((k) => 1 / (1 + Math.abs(k - seed)));
                const weightSum = weights.reduce((a, b) => a + b, 0);

                const raw = weights.map((w) => (globalLimit * w) / weightSum);
                let quotas = raw.map((r, i) =>
                    Math.min(Math.floor(r), counts[i]),
                );
                let assigned = quotas.reduce((a, b) => a + b, 0);

                let remainder = globalLimit - assigned;
                if (remainder > 0) {
                    const fractional = raw.map((r, i) => ({
                        i,
                        frac: r - Math.floor(r),
                        cap: counts[i] - quotas[i],
                    }));
                    fractional.sort((a, b) => b.frac - a.frac);
                    for (let f of fractional) {
                        if (remainder <= 0) break;
                        const add = Math.min(remainder, f.cap);
                        if (add > 0) {
                            quotas[f.i] += add;
                            remainder -= add;
                        }
                    }
                }

                if (remainder > 0) {
                    for (let i = 0; i < quotas.length && remainder > 0; i++) {
                        const cap = counts[i] - quotas[i];
                        if (cap > 0) {
                            const add = Math.min(cap, remainder);
                            quotas[i] += add;
                            remainder -= add;
                        }
                    }
                }

                let sumQ = quotas.reduce((a, b) => a + b, 0);
                while (sumQ > globalLimit) {
                    let idxToReduce = quotas.reduce(
                        (acc, q, i) =>
                            q > 0 && (acc === -1 || weights[i] < weights[acc])
                                ? i
                                : acc,
                        -1,
                    );
                    if (idxToReduce === -1) break;
                    quotas[idxToReduce]--;
                    sumQ--;
                }

                return quotas;
            }

            // Helper functions for canonicalization / rotation
            function indicesToMask(indices, n) {
                const arr = Array(n).fill("0");
                indices.forEach((i) => {
                    arr[i] = "1";
                });
                return arr.join("");
            }

            function maskToIndices(mask) {
                const res = [];
                for (let i = 0; i < mask.length; i++)
                    if (mask[i] === "1") res.push(i);
                return res;
            }

            function rotateMaskRight(mask, r) {
                const n = mask.length;
                r = ((r % n) + n) % n;
                if (r === 0) return mask;
                return mask.slice(-r) + mask.slice(0, -r);
            }

            function canonicalizeMask(mask) {
                let best = null,
                    bestR = 0;
                const n = mask.length;
                for (let r = 0; r < n; r++) {
                    const s = rotateMaskRight(mask, r);
                    if (best === null || s < best) {
                        best = s;
                        bestR = r;
                    }
                }
                return { mask: best, rotation: bestR };
            }

            function orbitSizeOfMask(mask) {
                const n = mask.length;
                for (let r = 1; r <= n; r++) {
                    if (rotateMaskRight(mask, r) === mask) return r;
                }
                return n;
            }

            function rotateIndices(indices, r, n) {
                return indices
                    .map((i) => (i + r + n) % n)
                    .sort((a, b) => a - b);
            }

            function gcd(a, b) {
                a = Math.abs(a);
                b = Math.abs(b);
                while (b) {
                    const t = a % b;
                    a = b;
                    b = t;
                }
                return a;
            }

            function phi(n) {
                let result = n;
                let x = n;
                for (let p = 2; p * p <= x; p++) {
                    if (x % p === 0) {
                        while (x % p === 0) x = Math.floor(x / p);
                        result = Math.floor((result / p) * (p - 1));
                    }
                }
                if (x > 1) result = Math.floor((result / x) * (x - 1));
                return result;
            }

            function necklaceCount(n, k) {
                if (k < 0 || k > n) return 0;
                const g = gcd(n, k);
                let sum = 0;
                for (let d = 1; d <= g; d++) {
                    if (g % d === 0) {
                        sum +=
                            phi(d) * nCk(Math.floor(n / d), Math.floor(k / d));
                    }
                }
                return Math.round(sum / n);
            }

            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            function buildSessionPool() {
                sessionPool = [];
                for (let i = 0; i < patterns.length; i++) {
                    const orbit = patternOrbitSizes[i] || numSteps;
                    for (let r = 0; r < orbit; r++)
                        sessionPool.push({ rep: i, r });
                }
                shuffle(sessionPool);
            }

            // Helpers to highlight / clear the "first note" of a pending pattern
            function clearPendingFirst() {
                noteToggles.forEach((t) => t.classList.remove("pending-first"));
            }

            function markPendingFirstFromState(stateArr) {
                clearPendingFirst();
                if (!stateArr) return;
                for (let i = 0; i < stateArr.length; i++) {
                    if (parseInt(stateArr[i]) > 0) {
                        if (noteToggles[i])
                            noteToggles[i].classList.add("pending-first");
                        break;
                    }
                }
            }

            function rebuildDictionary() {
                const seed = parseInt(noteCountTarget.value) || 1;
                let targetMax = seed;
                if (noteCountUseMax && noteCountUseMax.checked) {
                    const parsedMax = parseInt(noteCountMaxVal.value);
                    if (!isNaN(parsedMax))
                        targetMax = Math.max(1, Math.min(numSteps, parsedMax));
                }

                let indices = Array.from({ length: numSteps }, (_, i) => i);
                let limit = numSteps === 16 ? 400 : 1000;

                // reset containers
                patterns = [];
                patternMasks = [];
                patternOrbitSizes = [];
                repRotationCursor = [];
                globalRepPointer = 0;
                sessionPool = [];

                // compute sizes in center-out order
                let sizes = computeExpansionSizes(seed, targetMax);

                // decide if we should compress by rotation (and not explicitly request allRotations)
                const compressEnabled =
                    compressByRotation &&
                    compressByRotation.checked &&
                    !(
                        coverageSelect &&
                        coverageSelect.value === "allRotations"
                    );

                // allocate quotas (use necklace counts when compressing)
                const quotas = allocateQuotasForSizes(
                    sizes,
                    numSteps,
                    limit,
                    seed,
                    compressEnabled,
                );

                if (compressEnabled) {
                    // build canonical representatives per size until quotas are met
                    const canonicalSet = new Set();

                    for (let i = 0; i < sizes.length; i++) {
                        const k = sizes[i];
                        const quota = quotas[i] || 0;
                        if (quota <= 0) continue;

                        // enumerate all combos for this size and pick canonical reps
                        const combos = getCombinations(
                            indices,
                            k,
                            nCk(numSteps, k),
                        );
                        let added = 0;
                        for (const combo of combos) {
                            const mask = indicesToMask(combo, numSteps);
                            const canonical = canonicalizeMask(mask).mask;
                            if (canonicalSet.has(canonical)) continue;
                            canonicalSet.add(canonical);

                            patterns.push(maskToIndices(canonical));
                            patternMasks.push(canonical);
                            patternOrbitSizes.push(orbitSizeOfMask(canonical));
                            repRotationCursor.push(0);

                            added++;
                            if (added >= quota) break;
                        }

                        if (patterns.length >= limit) break;
                    }

                    // Prepare session pool if randomSession coverage is selected
                    if (
                        coverageSelect &&
                        coverageSelect.value === "randomSession"
                    )
                        buildSessionPool();
                } else {
                    // no compression: enumerate combos per size (legacy behavior)
                    for (let i = 0; i < sizes.length; i++) {
                        const k = sizes[i];
                        const quota = quotas[i] || 0;
                        if (quota <= 0) continue;
                        const combos = getCombinations(indices, k, quota);
                        patterns = patterns.concat(combos);
                        if (patterns.length >= limit) break;
                    }
                }

                patternCountSpan.innerText =
                    patterns.length + (patterns.length === limit ? "+" : "");
                dictSelect.innerHTML = '<option value="-1">Custom</option>';
                patterns.forEach((pat, index) => {
                    const opt = document.createElement("option");
                    opt.value = index;
                    opt.innerText = `Pattern ${index + 1} (${pat.length} notes: ${pat.map((x) => x + 1).join("-")})`;
                    dictSelect.appendChild(opt);
                });
            }

            noteCountTarget.addEventListener("change", () => {
                if (parseInt(noteCountTarget.value) < 1)
                    noteCountTarget.value = 1;
                if (parseInt(noteCountTarget.value) > numSteps)
                    noteCountTarget.value = numSteps;
                rebuildDictionary();
                if (patterns.length > 0) {
                    const seed = parseInt(noteCountTarget.value);
                    let defaultIndex = patterns.findIndex(
                        (p) => p.length === seed,
                    );
                    if (defaultIndex === -1) defaultIndex = 0;
                    setGrid(patterns[defaultIndex]);
                }
                saveState();
            });

            // When max value or toggle changes, rebuild dictionary and pick a sensible default
            noteCountMaxVal &&
                noteCountMaxVal.addEventListener("change", () => {
                    if (parseInt(noteCountMaxVal.value) < 1)
                        noteCountMaxVal.value = 1;
                    if (parseInt(noteCountMaxVal.value) > numSteps)
                        noteCountMaxVal.value = numSteps;
                    rebuildDictionary();
                    if (patterns.length > 0) {
                        const seed = parseInt(noteCountTarget.value);
                        let defaultIndex = patterns.findIndex(
                            (p) => p.length === seed,
                        );
                        if (defaultIndex === -1) defaultIndex = 0;
                        setGrid(patterns[defaultIndex]);
                    }
                    saveState();
                });

            noteCountUseMax &&
                noteCountUseMax.addEventListener("change", () => {
                    rebuildDictionary();
                    if (patterns.length > 0) {
                        const seed = parseInt(noteCountTarget.value);
                        let defaultIndex = patterns.findIndex(
                            (p) => p.length === seed,
                        );
                        if (defaultIndex === -1) defaultIndex = 0;
                        setGrid(patterns[defaultIndex]);
                    }
                    saveState();
                });

            // Rebuild dictionary when compression/coverage options change
            compressByRotation &&
                compressByRotation.addEventListener("change", () => {
                    rebuildDictionary();
                    if (patterns.length > 0) {
                        const seed = parseInt(noteCountTarget.value);
                        let defaultIndex = patterns.findIndex(
                            (p) => p.length === seed,
                        );
                        if (defaultIndex === -1) defaultIndex = 0;
                        setGrid(patterns[defaultIndex]);
                    }
                    saveState();
                });

            coverageSelect &&
                coverageSelect.addEventListener("change", () => {
                    rebuildDictionary();
                    saveState();
                });

            autoRotateOnSelect &&
                autoRotateOnSelect.addEventListener("change", () => {
                    saveState();
                });

            // Atomic transition toggle (apply pendingPattern all at once)
            // default: enabled
            if (!document.getElementById("atomicTransitions")) {
                // If not present in markup (older versions), we create a default on the fly
                // so the code doesn't break. The UI control is preferable, but this is a fallback.
                const el = document.createElement("input");
                el.type = "checkbox";
                el.id = "atomicTransitions";
                el.checked = true;
                // NOTE: we do not insert it visually here; it's a safety fallback.
                document.body.appendChild(el);
            }
            const atomicTransitions =
                document.getElementById("atomicTransitions");
            atomicTransitions &&
                atomicTransitions.addEventListener("change", () => saveState());

            function forceCompleteSweep() {
                if (pendingPattern) {
                    noteToggles.forEach((t, i) =>
                        t.setAttribute("data-state", pendingPattern[i]),
                    );
                    pendingPattern = null;
                    try {
                        clearPendingFirst();
                    } catch (e) {
                        /* noop */
                    }
                }
            }

            function setGrid(indices, skipSync = false) {
                pendingPattern = null;
                try {
                    clearPendingFirst();
                } catch (e) {
                    /* noop */
                }
                noteToggles.forEach((t) => t.setAttribute("data-state", "0"));
                indices.forEach((idx) =>
                    noteToggles[idx].setAttribute("data-state", "2"),
                );
                if (!skipSync) syncUI();
            }

            function buildSequencerMatrix(steps) {
                numSteps = steps;
                noteCountTarget.max = numSteps;
                if (noteCountMaxVal) noteCountMaxVal.max = numSteps;
                if (parseInt(noteCountTarget.value) > numSteps)
                    noteCountTarget.value = numSteps;
                if (
                    noteCountMaxVal &&
                    parseInt(noteCountMaxVal.value) > numSteps
                )
                    noteCountMaxVal.value = numSteps;

                swingGroup.classList.toggle("disabled", numSteps === 12);

                grid.innerHTML =
                    '<div class="radar-hand" id="radarHand"></div><div class="radar-center"></div>';
                stepElements = [];
                noteToggles = [];

                // NEW: Generate Radar Spokes
                let spokeCount = 2; // Default 0deg and 90deg (crosshairs)
                if (numSteps === 16) spokeCount = 4; // Add diagonal spokes for the 8th notes

                for (let i = 0; i < spokeCount; i++) {
                    let spoke = document.createElement("div");
                    spoke.className = "spoke";
                    if (i % 2 === 0 || numSteps !== 16)
                        spoke.classList.add("spoke-strong");
                    spoke.style.transform = `translate(-50%, -50%) rotate(${i * (180 / spokeCount)}deg)`;
                    grid.appendChild(spoke);
                }

                let currentLabels = labels8;
                if (numSteps === 12) currentLabels = labels12;
                if (numSteps === 16) currentLabels = labels16;

                for (let i = 0; i < numSteps; i++) {
                    const stepDiv = document.createElement("div");
                    stepDiv.className = "step";

                    const labelDiv = document.createElement("div");
                    labelDiv.className = "step-label";
                    labelDiv.innerText = currentLabels[i];
                    stepDiv.appendChild(labelDiv);

                    const toggleDiv = document.createElement("div");
                    toggleDiv.className = "step-toggle";
                    toggleDiv.setAttribute("data-state", "0");

                    // NEW: Determine if node is an Anchor or a Swing node
                    let isAnchor = false;
                    if (numSteps === 8 || numSteps === 12) {
                        isAnchor = i % (numSteps / 4) === 0; // Beats 1, 2, 3, 4
                    } else if (numSteps === 16) {
                        isAnchor = i % 2 === 0; // 1, +, 2, +, etc.
                    }
                    toggleDiv.classList.add(
                        isAnchor ? "anchor-node" : "swing-node",
                    );

                    if (numSteps === 16) {
                        toggleDiv.style.width = "18px";
                        toggleDiv.style.height = "18px";
                    }

                    toggleDiv.onclick = () => {
                        forceCompleteSweep();
                        let s = parseInt(toggleDiv.getAttribute("data-state"));
                        toggleDiv.setAttribute("data-state", (s + 1) % 3);
                        syncUI();
                        saveState();
                    };

                    stepDiv.appendChild(toggleDiv);
                    grid.appendChild(stepDiv);
                    stepElements.push(stepDiv);
                    noteToggles.push(toggleDiv);
                }

                updateNodePositions();
                rebuildDictionary();
                if (patterns.length > 0) {
                    const seed = parseInt(noteCountTarget.value) || 1;
                    let defaultIndex = patterns.findIndex(
                        (p) => p.length === seed,
                    );
                    if (defaultIndex === -1) defaultIndex = 0;
                    setGrid(patterns[defaultIndex]);
                }
            }

            function updateNodePositions() {
                const toggleRadius = 150;
                const labelRadius = 185;
                const swing = parseFloat(swingSlider.value);

                for (let i = 0; i < numSteps; i++) {
                    let angleDeg = 0;
                    if (numSteps === 12) {
                        angleDeg = i * 30;
                    } else if (numSteps === 16) {
                        if (i % 2 === 0) angleDeg = (i / 2) * 45;
                        else angleDeg = Math.floor(i / 2) * 45 + swing * 45;
                    } else if (numSteps === 8) {
                        if (i % 2 === 0) angleDeg = (i / 2) * 90;
                        else angleDeg = Math.floor(i / 2) * 90 + swing * 90;
                    }

                    const angleRad = (angleDeg - 90) * (Math.PI / 180);

                    const x = 150 + toggleRadius * Math.cos(angleRad);
                    const y = 150 + toggleRadius * Math.sin(angleRad);
                    stepElements[i].style.left = `${x}px`;
                    stepElements[i].style.top = `${y}px`;

                    const labelX =
                        (labelRadius - toggleRadius) * Math.cos(angleRad);
                    const labelY =
                        (labelRadius - toggleRadius) * Math.sin(angleRad);

                    const labelEl =
                        stepElements[i].querySelector(".step-label");
                    if (labelEl) {
                        labelEl.style.transform = `translate(calc(-50% + ${labelX}px), calc(-50% + ${labelY}px)) scale(var(--label-scale))`;
                    }
                }
            }

            gridModeSelect.addEventListener("change", (e) => {
                let wasPlaying = isPlaying;
                if (wasPlaying) playBtn.click();
                buildSequencerMatrix(parseInt(e.target.value));
                activeSetlist = "";
                updateSetlistDropdown();
                renderSetlistUI();
                saveState();
            });

            // --- LIBRARY & SETLIST LOGIC ---
            function loadLibrary() {
                const savedLib = localStorage.getItem("jazzSeqLibrary");
                if (savedLib) library = JSON.parse(savedLib);
                updateSetlistDropdown();
            }

            function saveLibrary() {
                localStorage.setItem("jazzSeqLibrary", JSON.stringify(library));
            }

            function updateSetlistDropdown() {
                setlistSelect.innerHTML =
                    '<option value="">-- None --</option>';
                for (let listName in library) {
                    let opt = document.createElement("option");
                    opt.value = listName;
                    opt.innerText = `${listName} (${library[listName].gridMode}-Step)`;
                    setlistSelect.appendChild(opt);
                }
                setlistSelect.value = activeSetlist;
            }

            function createNewSetlist() {
                let name = newSetlistName.value.trim();
                if (!name) return alert("Please enter a name.");
                if (library[name])
                    return alert("A setlist with this name already exists.");

                library[name] = { gridMode: numSteps, patterns: [] };
                newSetlistName.value = "";
                activeSetlist = name;

                saveLibrary();
                updateSetlistDropdown();
                renderSetlistUI();
            }

            function deleteCurrentSetlist() {
                if (!activeSetlist) return;
                if (
                    confirm(
                        `Are you sure you want to delete the setlist "${activeSetlist}"?`,
                    )
                ) {
                    delete library[activeSetlist];
                    activeSetlist = "";
                    saveLibrary();
                    updateSetlistDropdown();
                    renderSetlistUI();
                    if (autoModeSelect.value.startsWith("setlist"))
                        autoModeSelect.value = "off";
                }
            }

            function addPatternToSetlist() {
                if (!activeSetlist)
                    return alert("Please create or select a setlist first.");
                if (library[activeSetlist].gridMode !== numSteps)
                    return alert(
                        `This setlist was built for a ${library[activeSetlist].gridMode}-Step grid. Change your grid mode to add patterns to it.`,
                    );

                let currentState = noteToggles.map((t) =>
                    t.getAttribute("data-state"),
                );
                library[activeSetlist].patterns.push(currentState);
                saveLibrary();
                renderSetlistUI();
            }

            function removePatternFromSetlist(index) {
                library[activeSetlist].patterns.splice(index, 1);
                saveLibrary();
                renderSetlistUI();
            }

            setlistSelect.addEventListener("change", (e) => {
                activeSetlist = e.target.value;
                setlistPlayIndex = 0;
                if (
                    activeSetlist &&
                    library[activeSetlist].gridMode !== numSteps
                ) {
                    gridModeSelect.value = library[activeSetlist].gridMode;
                    buildSequencerMatrix(library[activeSetlist].gridMode);
                }
                renderSetlistUI();
                saveState();
            });

            function renderSetlistUI() {
                setlistDisplay.innerHTML = "";
                if (!activeSetlist) {
                    setlistDisplay.innerHTML =
                        '<span style="color: #666; font-size: 12px; font-style: italic;">Select or create a setlist to add patterns...</span>';
                    return;
                }

                let pats = library[activeSetlist].patterns;
                if (pats.length === 0) {
                    setlistDisplay.innerHTML =
                        '<span style="color: #999; font-size: 12px;">Setlist is empty. Build a pattern and click Add.</span>';
                    return;
                }

                pats.forEach((patState, index) => {
                    let activeLabels = [];
                    patState.forEach((state, i) => {
                        if (state > 0) activeLabels.push(i + 1);
                    });

                    let badge = document.createElement("div");
                    badge.className = "setlist-badge";

                    let textSpan = document.createElement("span");
                    textSpan.innerText = `[${activeLabels.join(", ")}]`;
                    textSpan.onclick = () => loadPatternState(patState);

                    let delBtn = document.createElement("span");
                    delBtn.className = "badge-delete";
                    delBtn.innerText = "×";
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        removePatternFromSetlist(index);
                    };

                    badge.appendChild(textSpan);
                    badge.appendChild(delBtn);
                    setlistDisplay.appendChild(badge);
                });
            }

            function loadPatternState(patStateArray) {
                if (patStateArray.length !== numSteps) return;
                noteToggles.forEach((t, i) =>
                    t.setAttribute("data-state", patStateArray[i]),
                );
                syncUI();
            }

            // --- AUDIO & RADAR ENGINE ---
            let audioCtx;
            let isPlaying = false;
            let currentStep = 0;
            let nextNoteTime = 0.0;
            let timerID;

            playBtn.addEventListener("click", () => {
                if (!audioCtx)
                    audioCtx = new (
                        window.AudioContext || window.webkitAudioContext
                    )();
                if (isPlaying) {
                    isPlaying = false;
                    playBtn.innerText = "START SESSION";
                    playBtn.classList.remove("playing");
                    clearTimeout(timerID);
                    cancelAnimationFrame(radarReqId);
                    stepElements.forEach((el) => el.classList.remove("active"));

                    modeIndicator.innerText = "STANDBY";
                    modeIndicator.className = "";

                    cycleCount = 0;
                    cyclePhase = 0;
                    isGapMeasure = false;
                    isCountIn = false;
                    pendingPattern = null;
                    try {
                        clearPendingFirst();
                    } catch (e) {
                        /* noop */
                    }

                    updateOdometerUI();

                    const hand = document.getElementById("radarHand");
                    if (hand)
                        hand.style.transform = `translate(-50%, -100%) rotate(0deg)`;
                } else {
                    isPlaying = true;
                    playBtn.innerText = "STOP";
                    playBtn.classList.add("playing");
                    if (audioCtx.state === "suspended") audioCtx.resume();

                    currentStep = 0;
                    cycleCount = 0;
                    cyclePhase = 0;
                    isGapMeasure = false;
                    isCountIn = true;
                    nextNoteTime = audioCtx.currentTime + 0.05;
                    currentMeasureStartTime = nextNoteTime;
                    pendingPattern = null;
                    try {
                        clearPendingFirst();
                    } catch (e) {
                        /* noop */
                    }

                    scheduler();
                    updateRadar();
                }
            });

            function playTone(time, freq, type, decay, vol = 0.5) {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.type = type;
                osc.frequency.value = freq;
                gainNode.gain.setValueAtTime(vol, time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + decay);
                osc.start(time);
                osc.stop(time + decay);
            }

            function triggerVisualFlash(timeFromNow) {
                setTimeout(() => {
                    grid.classList.add("flash");
                    setTimeout(() => grid.classList.remove("flash"), 150);
                }, timeFromNow * 1000);
            }

            function scheduler() {
                while (nextNoteTime < audioCtx.currentTime + 0.1) {
                    scheduleNote(currentStep, nextNoteTime);
                    advanceTime();
                }
                timerID = setTimeout(scheduler, 25.0);
            }

            function scheduleNote(step, time) {
                if (step === 0) {
                    currentMeasureStartTime = time;

                    if (!isCountIn) {
                        let pMode = practiceSelect.value;
                        if (pMode === "call") {
                            isGapMeasure = cyclePhase === 1;
                        } else if (pMode === "sight") {
                            isGapMeasure = cyclePhase === 0;
                        } else {
                            isGapMeasure = false;
                        }
                    }

                    let targetCycles = parseInt(repeatsInput.value);
                    let isAutoActive =
                        autoModeSelect.value !== "off" || autoDynToggle.checked;
                    let pMode = practiceSelect.value;
                    let isLastMeasureBeforeEvolve = false;

                    if (!isCountIn && isAutoActive) {
                        if (pMode === "off") {
                            isLastMeasureBeforeEvolve =
                                cycleCount >= targetCycles - 1;
                        } else {
                            isLastMeasureBeforeEvolve =
                                cycleCount >= targetCycles - 1 &&
                                cyclePhase === 1;
                        }
                    }

                    if (isLastMeasureBeforeEvolve) {
                        pendingPattern = generateNextPattern();
                        // Mark the first active index of the next pattern for visual cue
                        try {
                            markPendingFirstFromState(pendingPattern);
                        } catch (e) {
                            /* noop */
                        }
                    } else {
                        pendingPattern = null;
                        try {
                            clearPendingFirst();
                        } catch (e) {
                            /* noop */
                        }
                    }
                }

                let stepsPerBeat = numSteps / 4;

                if (isCountIn) {
                    if (step % stepsPerBeat === 0) {
                        let beatIndex = step / stepsPerBeat;
                        let metVol = parseFloat(metVolSlider.value) || 0.5;
                        playTone(
                            time,
                            beatIndex === 0 ? 1200 : 800,
                            "sine",
                            0.05,
                            metVol,
                        );
                        if (visPulseToggle.checked)
                            triggerVisualFlash(time - audioCtx.currentTime);
                    }
                } else {
                    if (rideToggle.checked) {
                        let ridePattern = [0, 2, 3, 4, 6, 7];
                        if (numSteps === 12) ridePattern = [0, 3, 5, 6, 9, 11];
                        if (numSteps === 16) ridePattern = [0, 4, 6, 8, 12, 14];

                        if (ridePattern.includes(step)) {
                            let rideVol = parseFloat(rideVolSlider.value);
                            playTone(time, 4000, "sine", 0.1, rideVol);
                        }
                    }

                    if (step % stepsPerBeat === 0 && metronomeToggle.checked) {
                        let beatIndex = step / stepsPerBeat;
                        let beatCheckboxes = [
                            metBeat1,
                            metBeat2,
                            metBeat3,
                            metBeat4,
                        ];
                        if (beatCheckboxes[beatIndex].checked) {
                            let metVol = parseFloat(metVolSlider.value);
                            playTone(
                                time,
                                beatIndex === 0 ? 1200 : 800,
                                "sine",
                                0.05,
                                metVol,
                            );
                            if (visPulseToggle.checked)
                                triggerVisualFlash(time - audioCtx.currentTime);
                        }
                    }

                    let state = parseInt(
                        noteToggles[step].getAttribute("data-state"),
                    );

                    if (state > 0 && !isGapMeasure) {
                        let volume = state === 1 ? 0.15 : 0.6;
                        playTone(time, 300, "triangle", 0.2, volume);
                    }
                }

                setTimeout(
                    () => {
                        stepElements.forEach((el, idx) =>
                            el.classList.toggle("active", idx === step),
                        );

                        if (!isCountIn && pendingPattern) {
                            // If atomicTransitions is enabled, apply the whole new pattern
                            // at once at the beginning of the measure (step === 0) to
                            // avoid transient visual count fluctuations while the
                            // pattern is applied step-by-step.
                            if (
                                typeof atomicTransitions !== "undefined" &&
                                atomicTransitions &&
                                atomicTransitions.checked &&
                                step === 0
                            ) {
                                // apply entire pendingPattern atomically
                                forceCompleteSweep();
                                // ensure UI reflects new pattern
                                syncUI();
                            } else {
                                // legacy: apply pending pattern step-by-step (per-step morph)
                                noteToggles[step].setAttribute(
                                    "data-state",
                                    pendingPattern[step],
                                );

                                if (step === numSteps - 1) {
                                    syncUI();
                                }
                            }
                        }

                        if (isCountIn) {
                            modeIndicator.innerText = "COUNT IN...";
                            modeIndicator.className = "mode-countin";
                        } else if (isGapMeasure) {
                            modeIndicator.innerText = "YOUR TURN (PLAY)";
                            modeIndicator.className = "mode-play";
                        } else {
                            modeIndicator.innerText = "LISTEN & LEARN";
                            modeIndicator.className = "mode-listen";
                        }
                    },
                    (time - audioCtx.currentTime) * 1000,
                );

                if (step === numSteps - 1) {
                    if (isCountIn) {
                        isCountIn = false;
                        cycleCount = 0;
                        cyclePhase = 0;
                    } else {
                        let pMode = practiceSelect.value;
                        let targetCycles = parseInt(repeatsInput.value);

                        if (pMode !== "off") {
                            cyclePhase++;
                            if (cyclePhase > 1) {
                                cyclePhase = 0;
                                cycleCount++;
                            }
                        } else {
                            cycleCount++;
                        }

                        if (cycleCount >= targetCycles) {
                            cycleCount = 0;
                        }
                    }

                    setTimeout(
                        updateOdometerUI,
                        (time - audioCtx.currentTime) * 1000,
                    );
                }
            }

            function advanceTime() {
                const secondsPerBeat = 60.0 / parseFloat(bpmSlider.value);
                const swing = parseFloat(swingSlider.value);

                if (numSteps === 8) {
                    if (currentStep % 2 === 0)
                        nextNoteTime += secondsPerBeat * swing;
                    else nextNoteTime += secondsPerBeat * (1.0 - swing);
                } else if (numSteps === 12) {
                    nextNoteTime += secondsPerBeat / 3.0;
                } else if (numSteps === 16) {
                    const eighthNoteDuration = secondsPerBeat / 2.0;
                    if (currentStep % 2 === 0) {
                        nextNoteTime += eighthNoteDuration * swing;
                    } else {
                        nextNoteTime += eighthNoteDuration * (1.0 - swing);
                    }
                }
                currentStep = (currentStep + 1) % numSteps;
            }

            function updateRadar() {
                if (!isPlaying) return;
                let measureDuration = (60.0 / parseFloat(bpmSlider.value)) * 4;
                let elapsed = audioCtx.currentTime - currentMeasureStartTime;
                if (elapsed < 0) elapsed += measureDuration;

                let progress = elapsed / measureDuration;
                let angle = (progress % 1) * 360;

                const hand = document.getElementById("radarHand");
                if (hand)
                    hand.style.transform = `translate(-50%, -100%) rotate(${angle}deg)`;

                radarReqId = requestAnimationFrame(updateRadar);
            }

            // --- TRANSFORMATIONS & READ-AHEAD LOGIC ---
            function getActive() {
                let active = [];
                noteToggles.forEach((t, idx) => {
                    if (parseInt(t.getAttribute("data-state")) > 0)
                        active.push(idx);
                });
                return active;
            }

            function syncUI() {
                let active = getActive();

                // If we're using the value as a MAX, don't overwrite the numeric control when the user toggles steps.
                if (
                    active.length > 0 &&
                    !(noteCountUseMax && noteCountUseMax.checked) &&
                    active.length !== parseInt(noteCountTarget.value)
                ) {
                    noteCountTarget.value = active.length;
                    rebuildDictionary();
                }

                let foundIndex = -1;
                if (active.length > 0) {
                    if (
                        compressByRotation &&
                        compressByRotation.checked &&
                        patternMasks &&
                        patternMasks.length > 0
                    ) {
                        const mask = indicesToMask(active, numSteps);
                        const canonical = canonicalizeMask(mask).mask;
                        foundIndex = patternMasks.findIndex(
                            (m) => m === canonical,
                        );
                    } else {
                        foundIndex = patterns.findIndex(
                            (p) =>
                                p.length === active.length &&
                                p.every((val, i) => val === active[i]),
                        );
                    }
                }
                dictSelect.value = foundIndex;
            }

            dictSelect.addEventListener("change", (e) => {
                let val = parseInt(e.target.value);
                if (val === -1) return;
                let indicesToSet = patterns[val];
                if (
                    compressByRotation &&
                    compressByRotation.checked &&
                    autoRotateOnSelect &&
                    autoRotateOnSelect.checked &&
                    patternOrbitSizes[val]
                ) {
                    const orbit = patternOrbitSizes[val] || numSteps;
                    const r = Math.floor(Math.random() * orbit);
                    indicesToSet = rotateIndices(patterns[val], r, numSteps);
                }
                // Avoid triggering syncUI() here so the dictionary does not re-filter
                // while the user is browsing selections.
                setGrid(indicesToSet, true);
            });

            function rotatePattern(direction) {
                forceCompleteSweep();
                let state = noteToggles.map((t) =>
                    t.getAttribute("data-state"),
                );
                let newState = Array(numSteps).fill("0");
                state.forEach((val, i) => {
                    if (val !== "0") {
                        let newIdx = (i + direction + numSteps) % numSteps;
                        newState[newIdx] = val;
                    }
                });
                newState.forEach((val, i) =>
                    noteToggles[i].setAttribute("data-state", val),
                );
                syncUI();
                saveState();
            }

            function randomizePattern() {
                pendingPattern = null;
                try {
                    clearPendingFirst();
                } catch (e) {
                    /* noop */
                }
                let seed = parseInt(noteCountTarget.value) || 1;
                let target = seed;
                if (noteCountUseMax && noteCountUseMax.checked) {
                    let targetMax = Math.max(
                        1,
                        Math.min(
                            numSteps,
                            parseInt(noteCountMaxVal.value) || seed,
                        ),
                    );
                    let sizes = computeExpansionSizes(seed, targetMax);
                    const weights = sizes.map(
                        (k) => 1 / (1 + Math.abs(k - seed)),
                    );
                    const sumW = weights.reduce((a, b) => a + b, 0);
                    let r = Math.random() * sumW;
                    let acc = 0;
                    for (let i = 0; i < sizes.length; i++) {
                        acc += weights[i];
                        if (r <= acc) {
                            target = sizes[i];
                            break;
                        }
                    }
                }
                let pool = Array.from({ length: numSteps }, (_, i) => i);
                pool.sort(() => 0.5 - Math.random());
                let selected = pool.slice(0, target).sort((a, b) => a - b);
                setGrid(selected);
                saveState();
            }

            function randomizeDynamics() {
                forceCompleteSweep();
                let a = getActive();
                if (a.length === 0) return;
                a.forEach((idx) => {
                    let randomState = Math.random() > 0.5 ? "2" : "1";
                    noteToggles[idx].setAttribute("data-state", randomState);
                });
                syncUI();
                saveState();
            }

            function getRotatedState(currentState, direction) {
                let newState = Array(numSteps).fill("0");
                currentState.forEach((val, i) => {
                    if (val !== "0") {
                        let newIdx = (i + direction + numSteps) % numSteps;
                        newState[newIdx] = val;
                    }
                });
                return newState;
            }

            function generateNextPattern() {
                let mode = autoModeSelect.value;
                let currentState = noteToggles.map((t) =>
                    t.getAttribute("data-state"),
                );
                let nextState = [...currentState];

                let getA = (arr) => {
                    let a = [];
                    arr.forEach((v, i) => {
                        if (parseInt(v) > 0) a.push(i);
                    });
                    return a;
                };
                let a = getA(nextState);

                let applyA = (newA) => {
                    nextState.fill("0");
                    newA.forEach((idx) => (nextState[idx] = "2"));
                };

                if (mode.startsWith("setlist")) {
                    if (
                        activeSetlist &&
                        library[activeSetlist] &&
                        library[activeSetlist].patterns.length > 0
                    ) {
                        let list = library[activeSetlist];
                        if (list.gridMode === numSteps) {
                            if (mode === "setlistOrder") {
                                setlistPlayIndex =
                                    (setlistPlayIndex + 1) %
                                    list.patterns.length;
                                nextState = [
                                    ...list.patterns[setlistPlayIndex],
                                ];
                            } else {
                                nextState = [
                                    ...list.patterns[
                                        Math.floor(
                                            Math.random() *
                                                list.patterns.length,
                                        )
                                    ],
                                ];
                            }
                        }
                    }
                } else if (mode !== "off") {
                    if (mode === "forward") {
                        if (
                            compressByRotation &&
                            compressByRotation.checked &&
                            patternMasks &&
                            patternMasks.length > 0
                        ) {
                            const activeMask = indicesToMask(a, numSteps);
                            const canonical = canonicalizeMask(activeMask).mask;
                            let foundIndex = patternMasks.findIndex(
                                (m) => m === canonical,
                            );
                            if (foundIndex !== -1) {
                                let nextIndex =
                                    (foundIndex + 1) % patterns.length;
                                let indicesToApply = patterns[nextIndex];
                                if (
                                    autoRotateOnSelect &&
                                    autoRotateOnSelect.checked
                                ) {
                                    const orbit =
                                        patternOrbitSizes[nextIndex] ||
                                        numSteps;
                                    const offset = Math.floor(
                                        Math.random() * orbit,
                                    );
                                    indicesToApply = rotateIndices(
                                        patterns[nextIndex],
                                        offset,
                                        numSteps,
                                    );
                                }
                                applyA(indicesToApply);
                            }
                        } else {
                            let foundIndex = patterns.findIndex(
                                (p) =>
                                    p.length === a.length &&
                                    p.every((val, i) => val === a[i]),
                            );
                            if (foundIndex !== -1) {
                                let nextIndex =
                                    (foundIndex + 1) % patterns.length;
                                applyA(patterns[nextIndex]);
                            }
                        }
                    } else if (mode === "randAll") {
                        if (
                            compressByRotation &&
                            compressByRotation.checked &&
                            patterns.length > 0
                        ) {
                            const strategy = coverageSelect
                                ? coverageSelect.value
                                : "sequential";
                            if (strategy === "randomSession") {
                                if (!sessionPool || sessionPool.length === 0)
                                    buildSessionPool();
                                const item = sessionPool.pop();
                                if (item) {
                                    applyA(
                                        rotateIndices(
                                            patterns[item.rep],
                                            item.r,
                                            numSteps,
                                        ),
                                    );
                                }
                            } else if (strategy === "interleaved") {
                                if (patterns.length === 0) return nextState;
                                const rep = globalRepPointer % patterns.length;
                                globalRepPointer =
                                    (globalRepPointer + 1) % patterns.length;
                                const orbit =
                                    patternOrbitSizes[rep] || numSteps;
                                const offset = repRotationCursor[rep] || 0;
                                repRotationCursor[rep] = (offset + 1) % orbit;
                                applyA(
                                    rotateIndices(
                                        patterns[rep],
                                        offset,
                                        numSteps,
                                    ),
                                );
                            } else if (strategy === "sequential") {
                                if (patterns.length === 0) return nextState;
                                const rep = Math.floor(
                                    Math.random() * patterns.length,
                                );
                                const orbit =
                                    patternOrbitSizes[rep] || numSteps;
                                const offset = repRotationCursor[rep] || 0;
                                repRotationCursor[rep] = (offset + 1) % orbit;
                                applyA(
                                    rotateIndices(
                                        patterns[rep],
                                        offset,
                                        numSteps,
                                    ),
                                );
                            } else {
                                // fallback: random rotation
                                const rep = Math.floor(
                                    Math.random() * patterns.length,
                                );
                                const orbit =
                                    patternOrbitSizes[rep] || numSteps;
                                const offset = Math.floor(
                                    Math.random() * orbit,
                                );
                                applyA(
                                    rotateIndices(
                                        patterns[rep],
                                        offset,
                                        numSteps,
                                    ),
                                );
                            }
                        } else {
                            let nextIndex = Math.floor(
                                Math.random() * patterns.length,
                            );
                            applyA(patterns[nextIndex]);
                        }
                    } else if (mode === "rotateRight") {
                        nextState = getRotatedState(currentState, 1);
                    } else if (mode === "rotateLeft") {
                        nextState = getRotatedState(currentState, -1);
                    }
                }

                if (autoDynToggle.checked) {
                    let finalA = getA(nextState);
                    finalA.forEach((idx) => {
                        nextState[idx] = Math.random() > 0.5 ? "2" : "1";
                    });
                }

                return nextState;
            }

            function saveState() {
                const state = {
                    gridMode: gridModeSelect.value,
                    bpm: bpmSlider.value,
                    swing: swingSlider.value,
                    noteCount: noteCountTarget.value,
                    noteCountMax: noteCountMaxVal
                        ? noteCountMaxVal.value
                        : noteCountTarget.value,
                    noteCountUseMax: noteCountUseMax
                        ? noteCountUseMax.checked
                        : false,
                    compressByRotation: compressByRotation
                        ? compressByRotation.checked
                        : false,
                    coverageStrategy: coverageSelect
                        ? coverageSelect.value
                        : "sequential",
                    autoRotateOnSelect: autoRotateOnSelect
                        ? autoRotateOnSelect.checked
                        : false,
                    ride: rideToggle.checked,
                    rideVol: rideVolSlider.value,
                    met: metronomeToggle.checked,
                    metVol: metVolSlider.value,
                    visPulse: visPulseToggle.checked,
                    beats: [
                        metBeat1.checked,
                        metBeat2.checked,
                        metBeat3.checked,
                        metBeat4.checked,
                    ],
                    notes: noteToggles.map((t) => t.getAttribute("data-state")),
                    practiceMode: practiceSelect.value,
                    autoMode: autoModeSelect.value,
                    autoDyn: autoDynToggle.checked,
                    repeats: repeatsInput.value,
                    activeSetlist: activeSetlist,
                };
                localStorage.setItem("jazzSeqPhase6", JSON.stringify(state));
            }

            function loadState() {
                loadLibrary();
                const saved = localStorage.getItem("jazzSeqPhase6");
                if (saved) {
                    const state = JSON.parse(saved);
                    gridModeSelect.value = state.gridMode || "8";

                    numSteps = parseInt(gridModeSelect.value);
                    if (state.noteCount)
                        noteCountTarget.value = state.noteCount;
                    if (state.noteCountMax !== undefined && noteCountMaxVal)
                        noteCountMaxVal.value = state.noteCountMax;
                    if (state.noteCountUseMax !== undefined && noteCountUseMax)
                        noteCountUseMax.checked = !!state.noteCountUseMax;

                    // Restore rotation compression settings before building the matrix
                    if (
                        state.compressByRotation !== undefined &&
                        compressByRotation
                    )
                        compressByRotation.checked = !!state.compressByRotation;
                    if (state.coverageStrategy !== undefined && coverageSelect)
                        coverageSelect.value = state.coverageStrategy;
                    if (
                        state.autoRotateOnSelect !== undefined &&
                        autoRotateOnSelect
                    )
                        autoRotateOnSelect.checked = !!state.autoRotateOnSelect;

                    buildSequencerMatrix(numSteps);

                    bpmSlider.value = state.bpm;
                    swingSlider.value = state.swing;
                    rideToggle.checked = state.ride;
                    if (state.rideVol !== undefined)
                        rideVolSlider.value = state.rideVol;

                    metronomeToggle.checked = state.met;
                    if (state.metVol !== undefined)
                        metVolSlider.value = state.metVol;
                    if (state.visPulse !== undefined)
                        visPulseToggle.checked = state.visPulse;

                    metBeat1.checked = state.beats[0];
                    metBeat2.checked = state.beats[1];
                    metBeat3.checked = state.beats[2];
                    metBeat4.checked = state.beats[3];

                    if (state.practiceMode !== undefined) {
                        practiceSelect.value = state.practiceMode;
                    }

                    if (state.autoMode) autoModeSelect.value = state.autoMode;
                    if (state.autoDyn !== undefined)
                        autoDynToggle.checked = state.autoDyn;
                    if (state.repeats) repeatsInput.value = state.repeats;

                    if (state.activeSetlist && library[state.activeSetlist]) {
                        activeSetlist = state.activeSetlist;
                        setlistSelect.value = activeSetlist;
                    }

                    if (state.notes && state.notes.length === numSteps) {
                        state.notes.forEach((val, idx) =>
                            noteToggles[idx].setAttribute("data-state", val),
                        );
                    }

                    document.getElementById("bpmValue").innerText = state.bpm;
                    updateSwingLabel();
                    updateNodePositions();
                    renderSetlistUI();
                    updateOdometerUI();
                } else {
                    buildSequencerMatrix(8);
                }
                syncUI();
            }

            bpmSlider.addEventListener("input", (e) => {
                document.getElementById("bpmValue").innerText = e.target.value;
                saveState();
            });

            function updateSwingLabel() {
                let v = parseFloat(swingSlider.value);
                let t = "Straight";
                if (v > 0.6) t = "Triplet / Shuffle";
                if (v > 0.75) t = "Hard Swing";
                if (v >= 0.85) t = "Extreme";
                document.getElementById("swingValue").innerText =
                    `${t} (${Math.round(v * 100)}%)`;
            }

            swingSlider.addEventListener("input", () => {
                updateSwingLabel();
                updateNodePositions();
                saveState();
            });

            function updateOdometerUI() {
                if (!isPlaying) {
                    odometerStatus.innerText = "Paused";
                    return;
                }
                if (isCountIn) {
                    odometerStatus.innerText = "Count In...";
                    return;
                }

                let target = parseInt(repeatsInput.value);
                let pMode = practiceSelect.value;
                let phaseText = "";

                if (pMode === "call") {
                    phaseText = cyclePhase === 0 ? " (Listen)" : " (Play)";
                } else if (pMode === "sight") {
                    phaseText = cyclePhase === 0 ? " (Play)" : " (Listen)";
                }

                odometerStatus.innerText = `Cycle ${cycleCount + 1} / ${target}${phaseText}`;
            }

            [
                rideToggle,
                rideVolSlider,
                metronomeToggle,
                metVolSlider,
                visPulseToggle,
                practiceSelect,
                metBeat1,
                metBeat2,
                metBeat3,
                metBeat4,
                autoModeSelect,
                autoDynToggle,
                repeatsInput,
            ].forEach((el) => {
                el.addEventListener("change", () => {
                    updateOdometerUI();
                    saveState();
                });
            });

            // Boot Up
            loadState();
        </script>
    </body>
</html>
