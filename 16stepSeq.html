<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Advanced Jazz Circle Sequencer (Visual Swing Anchors)</title>
        <style>
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background-color: #121212;
                color: #e0e0e0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                padding: 20px;
            }
            .app-container {
                background: #1e1e1e;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                width: 100%;
                max-width: 800px;
            }
            h1 {
                margin-top: 0;
                color: #4fc3f7;
                font-size: 24px;
                border-bottom: 1px solid #333;
                padding-bottom: 15px;
                text-align: center;
            }

            .panel {
                background: #2c2c2c;
                padding: 20px;
                border-radius: 8px;
                margin-bottom: 20px;
            }
            .row {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                flex-wrap: wrap;
                gap: 15px;
            }

            button {
                background-color: #0288d1;
                color: white;
                border: none;
                padding: 10px 15px;
                font-size: 14px;
                font-weight: bold;
                border-radius: 6px;
                cursor: pointer;
                transition: 0.2s;
            }
            button:hover {
                background-color: #039be5;
            }
            #playBtn {
                background-color: #4caf50;
                font-size: 18px;
                padding: 12px 30px;
                width: 100%;
                margin-bottom: 10px;
            }
            #playBtn.playing {
                background-color: #f44336;
            }

            .control-group {
                display: flex;
                flex-direction: column;
                transition: opacity 0.3s;
            }
            .control-group.disabled {
                opacity: 0.3;
                pointer-events: none;
                filter: grayscale(100%);
            }
            label {
                font-size: 12px;
                font-weight: bold;
                color: #aaa;
                margin-bottom: 5px;
                text-transform: uppercase;
            }
            input[type="range"] {
                accent-color: #4fc3f7;
            }
            .vol-slider {
                width: 60px;
                height: 4px;
            }
            input[type="text"],
            select,
            input[type="number"] {
                background: #121212;
                color: #fff;
                border: 1px solid #444;
                padding: 8px;
                border-radius: 4px;
            }

            .beat-toggles {
                display: flex;
                gap: 8px;
                font-size: 12px;
                color: #ccc;
                margin-top: 5px;
            }
            .beat-toggles label {
                display: flex;
                align-items: center;
                gap: 3px;
                font-size: 11px;
                margin: 0;
                text-transform: none;
                cursor: pointer;
            }
            .beat-toggles input[type="checkbox"] {
                accent-color: #4fc3f7;
                margin: 0;
            }

            .status-header {
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                margin-bottom: 20px;
                gap: 15px;
                align-items: center;
            }
            #modeIndicator {
                display: inline-block;
                padding: 6px 20px;
                border-radius: 20px;
                font-weight: bold;
                font-size: 14px;
                background: #444;
                text-align: center;
                transition: background-color 0.2s;
                min-width: 160px;
            }
            .mode-listen {
                background: #2e7d32 !important;
                color: white;
            }
            .mode-play {
                background: #c62828 !important;
                color: white;
            }
            .mode-countin {
                background: #f57c00 !important;
                color: white;
            }

            .grid-panel {
                display: flex;
                justify-content: center;
                align-items: center;
                background: #222;
                padding: 40px;
                border-radius: 8px;
                border: 1px solid #444;
                margin-bottom: 20px;
                overflow: hidden;
            }

            .circle-container {
                position: relative;
                width: 300px;
                height: 300px;
                min-width: 300px;
                min-height: 300px;
                flex-shrink: 0;
                border: 2px dashed #444;
                border-radius: 50%;
                transition:
                    background-color 0.2s ease-in,
                    box-shadow 0.2s ease-in,
                    border-color 0.2s ease-in;
            }

            .circle-container.flash {
                transition: none;
                background-color: rgba(79, 195, 247, 0.15);
                box-shadow: inset 0 0 80px rgba(79, 195, 247, 0.5);
                border-color: #4fc3f7;
            }

            /* NEW: Spoke lines for the background */
            .spoke {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 1px;
                height: 100%;
                background: rgba(255, 255, 255, 0.08);
                pointer-events: none;
                z-index: 0;
                transform-origin: center center;
            }
            .spoke-strong {
                background: rgba(79, 195, 247, 0.2);
                width: 2px;
            }

            .radar-hand {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 2px;
                height: 50%;
                background: linear-gradient(
                    to top,
                    rgba(79, 195, 247, 0) 0%,
                    rgba(79, 195, 247, 1) 100%
                );
                transform-origin: bottom center;
                transform: translate(-50%, -100%) rotate(0deg);
                pointer-events: none;
                z-index: 1;
                box-shadow: 0 -10px 20px rgba(79, 195, 247, 0.5);
            }
            .radar-center {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 12px;
                height: 12px;
                background: #4fc3f7;
                border-radius: 50%;
                transform: translate(-50%, -50%);
                box-shadow: 0 0 10px #4fc3f7;
                z-index: 2;
                pointer-events: none;
            }

            .step {
                position: absolute;
                display: flex;
                justify-content: center;
                align-items: center;
                transform: translate(-50%, -50%);
                z-index: 3;
            }

            .step-label {
                position: absolute;
                top: 50%;
                left: 50%;
                font-size: 13px;
                font-weight: bold;
                color: #777;
                margin: 0;
                pointer-events: none;
                --label-scale: 1;
                transition:
                    color 0.2s ease,
                    transform 0.2s ease;
            }

            .step-toggle {
                position: relative;
                width: 24px;
                height: 24px;
                border-radius: 50%;
                cursor: pointer;
                background: #222;
                transition:
                    transform 0.2s ease,
                    background 0.2s ease,
                    border-color 0.2s ease;
                z-index: 2;
            }

            /* NEW: Distinct borders for anchor vs swinging notes */
            .anchor-node {
                border: 2px solid #777;
            }
            .swing-node {
                border: 2px dashed #555;
            }

            .step-toggle[data-state="1"] {
                background: #4fc3f7;
                border-color: #4fc3f7;
                opacity: 0.8;
            }
            .step-toggle[data-state="2"] {
                background: #ffeb3b;
                border-color: #ffeb3b;
                box-shadow: 0 0 12px #ffeb3b;
            }

            /* Highlight the first active step of the next/pending pattern */
            .step-toggle.pending-first {
                box-shadow: 0 0 14px rgba(76, 175, 80, 0.95);
                border-color: #4caf50 !important;
            }

            .step.active .step-label {
                color: #fff;
                --label-scale: 1.25;
            }
            .step.active .step-toggle {
                transform: scale(1.15);
            }

            .transform-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
            .transform-btn {
                background-color: #424242;
                border: 1px solid #555;
                width: 100%;
                padding: 12px;
                font-size: 15px;
            }
            .transform-btn:hover {
                background-color: #616161;
            }
            .section-title {
                font-size: 14px;
                color: #4fc3f7;
                margin-bottom: 10px;
                margin-top: 0;
                font-weight: bold;
            }

            /* Setlist Specific */
            .setlist-badge {
                background: #1a237e;
                border: 1px solid #283593;
                color: #90caf9;
                padding: 5px 10px;
                border-radius: 15px;
                font-size: 12px;
                font-weight: bold;
                display: flex;
                align-items: center;
                gap: 5px;
                cursor: pointer;
            }
            .setlist-badge:hover {
                background: #283593;
            }
            .badge-delete {
                color: #ff5252;
                cursor: pointer;
                font-weight: bold;
                padding-left: 5px;
            }
            .badge-delete:hover {
                color: #ff1744;
            }

            /* Tap Tempo Button Specifiek */
            #tapTempoBtn {
                padding: 4px 10px;
                font-size: 11px;
                background-color: #555;
                border-radius: 4px;
                margin-left: 5px;
            }

            @media (max-width: 450px) {
                .app-container {
                    padding: 15px;
                }
                .grid-panel {
                    padding: 20px 0;
                }
                .circle-container {
                    transform: scale(0.85);
                }
            }
            @media (max-width: 350px) {
                .circle-container {
                    transform: scale(0.75);
                }
            }
        </style>
    </head>
    <body>
        <div class="app-container">
            <h1>Jazz Pro Sequencer (Matrix Engine)</h1>

            <div class="status-header">
                <select
                    id="gridModeSelect"
                    style="
                        background: #0288d1;
                        color: white;
                        font-weight: bold;
                        border: none;
                        border-radius: 20px;
                        padding: 6px 15px;
                    "
                >
                    <option value="8">8-Step Grid (8th Notes)</option>
                    <option value="12">12-Step Grid (Triplets)</option>
                    <option value="16">16-Step Grid (16th Notes)</option>
                </select>
                <div id="modeIndicator">STANDBY</div>
            </div>

            <button id="playBtn">START SESSION</button>

            <div class="panel row" style="align-items: center">
                <div
                    class="control-group"
                    style="background: #333; padding: 10px; border-radius: 6px"
                >
                    <label style="color: #ffeb3b"
                        >Target Notes in Pattern</label
                    >
                    <div style="display: flex; align-items: center; gap: 8px">
                        <input
                            type="number"
                            id="noteCountTarget"
                            min="1"
                            max="16"
                            value="3"
                            style="text-align: center; font-weight: bold"
                            title="Center seed (selects sizes around this)"
                        />
                        <input
                            type="number"
                            id="noteCountMaxVal"
                            min="1"
                            max="16"
                            value="5"
                            style="
                                width: 60px;
                                text-align: center;
                                font-weight: bold;
                            "
                            title="Max allowed notes (upper bound)"
                        />
                        <label
                            style="
                                font-size: 12px;
                                color: #fff;
                                display: flex;
                                align-items: center;
                                gap: 6px;
                                margin-left: 6px;
                            "
                        >
                            <input type="checkbox" id="noteCountUseMax" />
                            <span>Use as max</span>
                        </label>
                    </div>
                    <div style="font-size: 11px; color: #bbb; margin-top: 6px">
                        When checked, patterns will be drawn from sizes centered
                        on the target and up to the Max value.
                    </div>
                </div>

                <div class="control-group">
                    <label>Dictionary (<span id="patternCount">0</span>)</label>
                    <select id="dictionarySelect" style="max-width: 150px">
                        <option value="-1">Custom</option>
                    </select>
                </div>

                <div class="control-group" style="min-width: 220px">
                    <label>Rotation Compression</label>
                    <div
                        style="display: flex; flex-direction: column; gap: 6px"
                    >
                        <label
                            style="
                                font-size: 12px;
                                color: #fff;
                                display: flex;
                                align-items: center;
                                gap: 6px;
                            "
                        >
                            <input
                                type="checkbox"
                                id="compressByRotation"
                                checked
                            />
                            <span>Compress by rotation</span>
                        </label>
                        <label
                            style="
                                font-size: 12px;
                                color: #fff;
                                display: flex;
                                align-items: center;
                                gap: 6px;
                            "
                        >
                            <input
                                type="checkbox"
                                id="autoRotateOnSelect"
                                checked
                            />
                            <span>Auto-rotate on select</span>
                        </label>
                        <div
                            style="display: flex; align-items: center; gap: 6px"
                        >
                            <label
                                style="
                                    font-size: 11px;
                                    color: #bbb;
                                    margin-right: 6px;
                                "
                                >Coverage</label
                            >
                            <select
                                id="coverageSelect"
                                style="
                                    background: #222;
                                    color: #fff;
                                    border: 1px solid #555;
                                    padding: 4px;
                                    border-radius: 4px;
                                "
                            >
                                <option value="sequential">
                                    Sequential (per rep)
                                </option>
                                <option value="interleaved">Interleaved</option>
                                <option value="randomSession">
                                    Random session
                                </option>
                                <option value="allRotations">
                                    All rotations (no compression)
                                </option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="control-group">
                    <label
                        >BPM:
                        <span id="bpmValue" style="color: #fff"
                            >100</span
                        ></label
                    >
                    <input
                        type="range"
                        id="bpmSlider"
                        min="60"
                        max="240"
                        value="100"
                    />
                </div>
                <div class="control-group" id="swingGroup">
                    <label
                        >Swing:
                        <span id="swingValue" style="color: #fff"
                            >Straight</span
                        ></label
                    >
                    <input
                        type="range"
                        id="swingSlider"
                        min="0.50"
                        max="0.875"
                        step="0.01"
                        value="0.50"
                    />
                </div>

                <div class="control-group" style="gap: 10px">
                    <div style="display: flex; align-items: center; gap: 10px">
                        <input
                            type="checkbox"
                            id="rideToggle"
                            style="
                                width: 18px;
                                height: 18px;
                                accent-color: #ffb300;
                            "
                        />
                        <label style="margin: 0; color: #ffb300"
                            >Ride Cymbal</label
                        >
                        <input
                            type="range"
                            id="rideVolSlider"
                            class="vol-slider"
                            min="0"
                            max="1"
                            step="0.01"
                            value="0.05"
                        />
                    </div>
                    <div
                        style="display: flex; flex-direction: column; gap: 3px"
                    >
                        <label style="margin: 0; color: #4fc3f7"
                            >Practice Mode</label
                        >
                        <select
                            id="practiceSelect"
                            style="
                                background: #222;
                                color: #fff;
                                border: 1px solid #555;
                                padding: 4px;
                                border-radius: 4px;
                                max-width: 180px;
                                font-size: 11px;
                            "
                        >
                            <option value="off">Off (Continuous)</option>
                            <option value="call">
                                Call & Response (Hear &rarr; Play)
                            </option>
                            <option value="sight">
                                Sight Read (Play &rarr; Hear)
                            </option>
                        </select>
                    </div>
                </div>

                <div class="control-group">
                    <div style="display: flex; align-items: center; gap: 10px">
                        <input
                            type="checkbox"
                            id="metronomeToggle"
                            checked
                            style="
                                width: 18px;
                                height: 18px;
                                accent-color: #4fc3f7;
                            "
                        />
                        <label style="margin: 0; color: #fff">Metronome</label>
                        <input
                            type="range"
                            id="metVolSlider"
                            class="vol-slider"
                            min="0"
                            max="1"
                            step="0.01"
                            value="0.2"
                        />
                        <button id="tapTempoBtn">TAP</button>
                    </div>
                    <div class="beat-toggles">
                        <label
                            ><input type="checkbox" id="metBeat1" checked />
                            1</label
                        >
                        <label
                            ><input type="checkbox" id="metBeat2" checked />
                            2</label
                        >
                        <label
                            ><input type="checkbox" id="metBeat3" checked />
                            3</label
                        >
                        <label
                            ><input type="checkbox" id="metBeat4" checked />
                            4</label
                        >
                    </div>
                    <div
                        style="
                            display: flex;
                            align-items: center;
                            gap: 5px;
                            margin-top: 5px;
                        "
                    >
                        <input
                            type="checkbox"
                            id="visPulseToggle"
                            checked
                            style="accent-color: #4fc3f7"
                        />
                        <label style="margin: 0; color: #aaa; font-size: 10px"
                            >Visual Pulse</label
                        >
                    </div>
                </div>
            </div>

            <div class="grid-panel">
                <div class="circle-container" id="grid"></div>
            </div>

            <div class="panel">
                <h3 class="section-title">
                    Rhythmic Displacement (Manual Shifts)
                </h3>
                <div class="transform-grid">
                    <button class="transform-btn" onclick="rotatePattern(-1)">
                        &larr; Rotate Entire Pattern Left
                    </button>
                    <button class="transform-btn" onclick="rotatePattern(1)">
                        Rotate Entire Pattern Right &rarr;
                    </button>
                </div>

                <h3 class="section-title" style="margin-top: 20px">
                    Randomizers
                </h3>
                <div class="transform-grid">
                    <button class="transform-btn" onclick="randomizePattern()">
                        Randomize Pattern Placements
                    </button>
                    <button class="transform-btn" onclick="randomizeDynamics()">
                        Randomize Accents / Ghosts
                    </button>
                </div>
            </div>

            <div class="panel">
                <div
                    style="
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        border-bottom: 1px solid #444;
                        padding-bottom: 10px;
                        margin-bottom: 15px;
                    "
                >
                    <h3 class="section-title" style="margin: 0">
                        Library & Setlists
                    </h3>
                    <button
                        onclick="deleteCurrentSetlist()"
                        style="
                            background: transparent;
                            color: #ff5252;
                            padding: 0;
                            font-size: 12px;
                        "
                    >
                        Delete Setlist
                    </button>
                </div>

                <div class="row" style="align-items: center">
                    <div class="control-group">
                        <label>Active Setlist</label>
                        <select id="setlistSelect" style="min-width: 150px">
                            <option value="">-- None --</option>
                        </select>
                    </div>
                    <div
                        class="control-group"
                        style="
                            flex-direction: row;
                            gap: 5px;
                            align-items: flex-end;
                        "
                    >
                        <div>
                            <label>New Setlist</label>
                            <input
                                type="text"
                                id="newSetlistName"
                                placeholder="Name..."
                                style="width: 120px"
                            />
                        </div>
                        <button onclick="createNewSetlist()">Create</button>
                    </div>
                    <div class="control-group">
                        <button
                            onclick="addPatternToSetlist()"
                            style="background: #f57c00; margin-top: 18px"
                        >
                            + Add Current Pattern
                        </button>
                    </div>
                </div>

                <div
                    id="setlistDisplay"
                    style="
                        margin-top: 15px;
                        display: flex;
                        gap: 8px;
                        flex-wrap: wrap;
                        min-height: 30px;
                        padding: 10px;
                        background: #222;
                        border-radius: 6px;
                    "
                >
                    <span
                        style="color: #666; font-size: 12px; font-style: italic"
                        >Select or create a setlist to add patterns...</span
                    >
                </div>
            </div>

            <div
                class="panel row"
                style="background: #1a237e; align-items: center"
            >
                <div class="control-group">
                    <label style="color: #90caf9">Auto-Evolve Mode</label>
                    <select
                        id="autoModeSelect"
                        style="
                            background: #283593;
                            border: none;
                            padding-right: 10px;
                        "
                    >
                        <option value="off">Off</option>
                        <option disabled>── SETLIST ──</option>
                        <option value="setlistOrder">
                            Play Setlist (In Order)
                        </option>
                        <option value="setlistShuffle">
                            Play Setlist (Shuffle)
                        </option>
                        <option disabled>── GENERATIVE ──</option>
                        <option value="forward">
                            Sequence Dictionary Forward
                        </option>
                        <option value="rotateRight">Auto-Rotate Right</option>
                        <option value="rotateLeft">Auto-Rotate Left</option>
                        <option value="randAll">Auto-Randomize Pattern</option>
                    </select>
                </div>

                <div class="control-group">
                    <label style="color: #90caf9">+ Dynamics</label>
                    <div
                        style="
                            display: flex;
                            align-items: center;
                            gap: 8px;
                            margin-top: 4px;
                        "
                    >
                        <input
                            type="checkbox"
                            id="autoDynToggle"
                            style="
                                width: 18px;
                                height: 18px;
                                accent-color: #4fc3f7;
                            "
                        />
                        <span
                            style="
                                color: #fff;
                                font-size: 12px;
                                font-weight: bold;
                            "
                            >Shuffle Accents</span
                        >
                    </div>
                </div>

                <div class="control-group">
                    <label style="color: #90caf9">Evolve Every X Cycles</label>
                    <input
                        type="number"
                        id="repeatsInput"
                        min="1"
                        value="1"
                        style="
                            background: #283593;
                            border: none;
                            width: 60px;
                            text-align: center;
                        "
                    />
                </div>

                <div class="control-group" style="min-width: 140px">
                    <label style="color: #90caf9">Status</label>
                    <span
                        id="odometerStatus"
                        style="font-weight: bold; font-size: 14px"
                        >Cycle 1 / 1</span
                    >
                </div>
            </div>
        </div>

        <script>
            // --- DOM Elements ---
            const gridModeSelect = document.getElementById("gridModeSelect");
            const playBtn = document.getElementById("playBtn");
            const bpmSlider = document.getElementById("bpmSlider");
            const swingSlider = document.getElementById("swingSlider");
            const swingGroup = document.getElementById("swingGroup");

            const noteCountTarget = document.getElementById("noteCountTarget");
            const noteCountMaxVal = document.getElementById("noteCountMaxVal");
            const noteCountUseMax = document.getElementById("noteCountUseMax");
            const dictSelect = document.getElementById("dictionarySelect");
            const patternCountSpan = document.getElementById("patternCount");
            const compressByRotation =
                document.getElementById("compressByRotation");
            const coverageSelect = document.getElementById("coverageSelect");
            const autoRotateOnSelect =
                document.getElementById("autoRotateOnSelect");

            const grid = document.getElementById("grid");

            const rideToggle = document.getElementById("rideToggle");
            const rideVolSlider = document.getElementById("rideVolSlider");
            const metronomeToggle = document.getElementById("metronomeToggle");
            const metVolSlider = document.getElementById("metVolSlider");
            const visPulseToggle = document.getElementById("visPulseToggle");
            const tapTempoBtn = document.getElementById("tapTempoBtn");

            const practiceSelect = document.getElementById("practiceSelect");

            const metBeat1 = document.getElementById("metBeat1");
            const metBeat2 = document.getElementById("metBeat2");
            const metBeat3 = document.getElementById("metBeat3");
            const metBeat4 = document.getElementById("metBeat4");
            const modeIndicator = document.getElementById("modeIndicator");

            const setlistSelect = document.getElementById("setlistSelect");
            const newSetlistName = document.getElementById("newSetlistName");
            const setlistDisplay = document.getElementById("setlistDisplay");

            // --- Dynamic Engine State ---
            let numSteps = 8;
            let patterns = [];
            let patternMasks = []; // canonical masks for compressed dictionary
            let patternOrbitSizes = []; // orbit size per canonical rep
            let repRotationCursor = []; // rotation cursor per rep
            let globalRepPointer = 0; // pointer used for interleaved coverage
            let sessionPool = []; // for randomSession coverage
            let stepElements = [];
            let noteToggles = [];

            let currentMeasureStartTime = 0;
            let radarReqId = null;
            let library = {};
            let activeSetlist = "";

            let pendingPattern = null;

            // Core Timing State
            let isCountIn = false;
            let isGapMeasure = false;
            let cycleCount = 0;
            let cyclePhase = 0;

            const labels8 = ["1", "+", "2", "+", "3", "+", "4", "+"];
            const labels12 = [
                "1",
                "trip",
                "let",
